services:
  - type: web
    name: marketpulse
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    disk:
      name: database
      mountPath: /opt/render/project/src/data
      sizeGB: 1
